<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Not now</title>
  <script src="../utils/hash.js"></script>
  <style>
    :root {
      --bg: oklch(1 0 0);
      --surface: oklch(0.967 0.005 57);
      --line: oklch(0.90 0.008 57);
      --ink: oklch(0.28 0.012 57);
      --muted: oklch(0.47 0.012 57);
      --primary: oklch(0.53 0.125 55);
      --primary-deep: oklch(0.47 0.115 55);
      --error: oklch(0.50 0.16 27);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .page {
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .mark {
      width: 30px;
      height: 30px;
      color: var(--primary);
      margin-bottom: 36px;
    }
    .site-name {
      font-family: ui-serif, "New York", Georgia, "Times New Roman", serif;
      font-size: 38px;
      font-weight: 600;
      letter-spacing: -0.015em;
      line-height: 1.15;
      text-wrap: balance;
      overflow-wrap: break-word;
      margin-bottom: 18px;
    }
    .subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .countdown {
      font-size: 15px;
      font-weight: 500;
      color: var(--ink);
    }
    .bypass {
      margin-top: 64px;
      padding-top: 24px;
      border-top: 1px solid var(--line);
    }
    .bypass-label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .input-row {
      display: flex;
      gap: 8px;
      max-width: 340px;
      margin: 0 auto;
    }
    input[type="password"] {
      flex: 1;
      min-width: 0;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      font-size: 14px;
      font-family: inherit;
      padding: 10px 13px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input[type="password"]::placeholder { color: var(--muted); }
    input[type="password"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px oklch(0.53 0.125 55 / 0.15);
    }
    button {
      background: var(--primary);
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      padding: 10px 18px;
      transition: background 0.15s;
      white-space: nowrap;
    }
    button:hover { background: var(--primary-deep); }
    button:focus-visible { outline: 2px solid var(--primary-deep); outline-offset: 2px; }
    .error-msg {
      color: var(--error);
      font-size: 13px;
      margin-top: 10px;
      min-height: 18px;
    }
    .footer {
      margin-top: 48px;
      color: var(--muted);
      font-size: 12px;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(5px); }
    }
    .shake { animation: shake 0.35s ease; }
    @media (prefers-reduced-motion: reduce) {
      .shake { animation: none; }
      * { transition: none !important; }
    }
  </style>
</head>
<body>
  <div class="page">
    <svg class="mark" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
    </svg>
    <h1 class="site-name" id="siteName">This site can wait.</h1>
    <div class="subtitle" id="workHours">Focus hours: 9:00 AM – 5:00 PM</div>
    <div class="countdown" id="countdown"></div>

    <div class="bypass">
      <div class="bypass-label">Need it now? Unlock everything for 15 minutes.</div>
      <div class="input-row">
        <input type="password" id="passwordInput" placeholder="Bypass password" autocomplete="off" />
        <button id="bypassBtn">Unlock</button>
      </div>
      <div class="error-msg" id="errorMsg"></div>
    </div>

    <div class="footer">Locked In</div>
  </div>
  <script src="blocked.js"></script>
</body>
</html>
