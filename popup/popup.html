<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Productivity Blocker</title>
  <script src="../utils/hash.js"></script>
  <style>
    :root {
      --bg: oklch(1 0 0);
      --surface: oklch(0.967 0.005 57);
      --line: oklch(0.90 0.008 57);
      --ink: oklch(0.28 0.012 57);
      --muted: oklch(0.47 0.012 57);
      --primary: oklch(0.53 0.125 55);
      --primary-deep: oklch(0.47 0.115 55);
      --amber-tint: oklch(0.93 0.05 65);
      --amber-text: oklch(0.45 0.12 55);
      --pine: oklch(0.30 0.07 170);
      --pine-tint: oklch(0.93 0.04 165);
      --error: oklch(0.50 0.16 27);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 292px;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 13px;
      padding: 18px 18px 14px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
    }
    .mark { width: 15px; height: 15px; color: var(--primary); flex-shrink: 0; }
    .title { font-size: 13.5px; font-weight: 600; letter-spacing: -0.01em; margin-right: auto; white-space: nowrap; }
    .badge {
      font-size: 12px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 999px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .badge-on  { background: var(--amber-tint); color: var(--amber-text); }
    .badge-off { background: var(--pine-tint);  color: var(--pine); }

    .status { border-top: 1px solid var(--line); }
    .row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
    }
    .row-label { font-size: 12px; color: var(--muted); }
    .row-value { font-size: 13px; font-weight: 500; color: var(--ink); text-align: right; }

    .bypass-active {
      background: var(--pine-tint);
      border-radius: 8px;
      padding: 9px 12px;
      margin-top: 10px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
    }
    .bypass-active .row-label { color: var(--pine); font-weight: 600; font-size: 12px; }
    .bypass-active .row-value { color: var(--pine); font-weight: 500; }

    .bypass-section { margin-top: 16px; }
    .bypass-label { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
    .input-row { display: flex; gap: 6px; }
    input[type="password"] {
      flex: 1;
      min-width: 0;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 7px;
      color: var(--ink);
      font-size: 13px;
      padding: 7px 10px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input[type="password"]::placeholder { color: var(--muted); }
    input[type="password"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px oklch(0.53 0.125 55 / 0.15);
    }
    button.bypass-btn {
      background: var(--primary);
      border: none;
      border-radius: 7px;
      color: #fff;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      padding: 7px 13px;
      transition: background 0.15s;
    }
    button.bypass-btn:hover { background: var(--primary-deep); }
    button.bypass-btn:focus-visible { outline: 2px solid var(--primary-deep); outline-offset: 2px; }
    .error { color: var(--error); font-size: 12px; margin-top: 7px; min-height: 15px; }

    .settings-link {
      display: block;
      width: 100%;
      margin-top: 6px;
      padding: 7px 0 2px;
      background: none;
      border: none;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      text-align: center;
      transition: color 0.15s;
    }
    .settings-link:hover { color: var(--ink); }
    .settings-link:focus-visible { outline: 2px solid var(--primary); outline-offset: -2px; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="header">
    <svg class="mark" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M12 2l8 3v6.09c0 5.05-3.41 9.76-8 10.91-4.59-1.15-8-5.86-8-10.91V5z"/>
    </svg>
    <span class="title">Productivity Blocker</span>
    <span class="badge" id="statusBadge">—</span>
  </div>

  <div class="status">
    <div class="row">
      <span class="row-label">Schedule</span>
      <span class="row-value" id="workHours">9:00 AM – 5:00 PM</span>
    </div>
    <div class="row">
      <span class="row-label" id="nextLabel">Next change</span>
      <span class="row-value" id="nextTime">—</span>
    </div>
  </div>

  <div class="bypass-active" id="bypassRow" style="display:none">
    <span class="row-label">Bypass active</span>
    <span class="row-value" id="bypassCountdown">—</span>
  </div>

  <div class="bypass-section" id="bypassSection">
    <div class="bypass-label">15-minute bypass</div>
    <div class="input-row">
      <input type="password" id="passwordInput" placeholder="Password" autocomplete="off" />
      <button class="bypass-btn" id="bypassBtn">Unlock</button>
    </div>
    <div class="error" id="errorMsg"></div>
  </div>

  <button class="settings-link" id="settingsBtn">Settings</button>
  <script src="popup.js"></script>
</body>
</html>
