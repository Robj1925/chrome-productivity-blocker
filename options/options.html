<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Locked In — Settings</title>
  <script src="../utils/hash.js"></script>
  <style>
    :root {
      --bg: oklch(1 0 0);
      --surface: oklch(0.967 0.005 57);
      --line: oklch(0.90 0.008 57);
      --ink: oklch(0.28 0.012 57);
      --muted: oklch(0.47 0.012 57);
      --primary: oklch(0.53 0.125 55);
      --primary-deep: oklch(0.47 0.115 55);
      --pine: oklch(0.30 0.07 170);
      --error: oklch(0.50 0.16 27);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      padding: 56px 24px 64px;
    }
    .wrap { max-width: 560px; margin: 0 auto; }

    .masthead {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 44px;
    }
    .mark { width: 20px; height: 20px; color: var(--primary); }
    h1 { font-size: 22px; font-weight: 650; letter-spacing: -0.015em; }

    section { padding: 28px 0; border-top: 1px solid var(--line); }
    section:last-of-type { border-bottom: 1px solid var(--line); }
    h2 { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
    .section-note { font-size: 13px; color: var(--muted); margin: 3px 0 18px; }

    label {
      font-size: 13px;
      color: var(--muted);
      display: block;
      margin-bottom: 6px;
    }
    input[type="time"],
    input[type="password"] {
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      font-size: 14px;
      font-family: inherit;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      display: block;
      margin-bottom: 16px;
      width: 100%;
    }
    input::placeholder { color: var(--muted); }
    input[type="time"]:focus,
    input[type="password"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px oklch(0.53 0.125 55 / 0.15);
    }
    .hours-row { display: flex; gap: 16px; }
    .hours-row .field { flex: 1; }

    button.save {
      background: var(--primary);
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      padding: 9px 18px;
      transition: background 0.15s;
    }
    button.save:hover { background: var(--primary-deep); }
    button.save:focus-visible { outline: 2px solid var(--primary-deep); outline-offset: 2px; }

    .msg { font-size: 13px; margin-top: 10px; min-height: 18px; }
    .msg-success { color: var(--pine); }
    .msg-error { color: var(--error); }

    .site-list { display: flex; flex-direction: column; }
    .site-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 8px;
      margin: 0 -8px;
      border-radius: 8px;
      transition: background 0.15s;
    }
    .site-item:hover { background: var(--surface); }
    .site-domain { font-size: 14px; font-weight: 500; color: var(--ink); }
    .site-category { font-size: 12px; color: var(--muted); margin-top: 1px; }
    input[type="checkbox"] {
      width: 17px;
      height: 17px;
      cursor: pointer;
      accent-color: var(--primary);
      flex-shrink: 0;
    }
    input[type="checkbox"]:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="masthead">
      <svg class="mark" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
      </svg>
      <h1>Locked In</h1>
    </div>

    <section>
      <h2>Focus hours</h2>
      <p class="section-note">Distracting sites are blocked between these times, every day.</p>
      <div class="hours-row">
        <div class="field">
          <label for="workStart">Start</label>
          <input type="time" id="workStart" value="09:00" />
        </div>
        <div class="field">
          <label for="workEnd">End</label>
          <input type="time" id="workEnd" value="17:00" />
        </div>
      </div>
      <button class="save" id="saveHours">Save hours</button>
      <div class="msg" id="hoursMsg"></div>
    </section>

    <section>
      <h2>Bypass password</h2>
      <p class="section-note">Unlocks blocked sites for 15 minutes when you truly need them.</p>
      <label for="currentPassword">Current password</label>
      <input type="password" id="currentPassword" placeholder="Leave blank if not yet set" autocomplete="current-password" />
      <label for="newPassword">New password</label>
      <input type="password" id="newPassword" placeholder="New password" autocomplete="new-password" />
      <label for="confirmPassword">Confirm new password</label>
      <input type="password" id="confirmPassword" placeholder="Confirm password" autocomplete="new-password" />
      <button class="save" id="savePassword">Save password</button>
      <div class="msg" id="passwordMsg"></div>
    </section>

    <section>
      <h2>Blocked sites</h2>
      <p class="section-note">Unchecked sites are left alone during focus hours.</p>
      <div class="site-list" id="siteList"></div>
    </section>
  </div>

  <script src="options.js"></script>
</body>
</html>
